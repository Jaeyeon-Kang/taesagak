<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#1a1a1a"/>

  <!-- 사람 — 퇴사하며 당당하게 걸어가는 모습 -->
  <circle cx="40" cy="25" r="9.5" fill="#fff"/>

  <g stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- 몸통 -->
    <line x1="40" y1="35" x2="40" y2="58"/>
    <!-- 오른팔 — 위로 던지는 동작 -->
    <polyline points="40,44 55,33 65,24"/>
    <!-- 왼팔 — 자연스럽게 내림 -->
    <line x1="40" y1="46" x2="26" y2="55"/>
    <!-- 다리 — 걸어가는 중 -->
    <line x1="40" y1="58" x2="28" y2="78"/>
    <line x1="40" y1="58" x2="54" y2="76"/>
  </g>

  <!-- 날아가는 서류 (브랜드 컬러 포인트) -->
  <rect x="68" y="10" width="14" height="10" rx="2" fill="#E8573D" transform="rotate(-12, 75, 15)"/>
</svg>
